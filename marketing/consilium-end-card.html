<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Welcome to The Consilium — End Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@200;300;400;500&display=swap"
  rel="stylesheet"
/>
<style>
  :root {
    --deep-black: #0a0a0a;
    --deep-burgundy: #4a1426;
    --deep-navy: #0f172a;
    --warm-gold-1: #f3d98a;
    --warm-gold-2: #d4af37;
    --warm-gold-3: #9c7a1f;
    --text-light: #e5e5e5;
    --text-gray: #a0a0a0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: #000;
    color: var(--text-light);
    font-family: "Inter", system-ui, sans-serif;
    overflow: hidden;
    height: 100%;
  }

  /* Stage fits the viewport. The canvas is absolutely positioned inside
     it and scaled from its top-left corner — this way the scaled visual
     size matches the layout footprint, so nothing overflows regardless
     of window dimensions. Centering is done by the fit() script.
     For a real export, screen-record the canvas at 100% zoom (or use
     ffmpeg) to capture the true 1080x1920 frame. */
  .stage {
    position: fixed;
    inset: 0;
    background: #000;
    overflow: hidden;
  }

  .canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 1080px;
    height: 1920px;
    transform-origin: 0 0;
    transform: scale(var(--fit, 1));
    background:
      radial-gradient(
        ellipse 80% 55% at 50% 28%,
        rgba(74, 20, 38, 0.45) 0%,
        rgba(74, 20, 38, 0.12) 40%,
        rgba(10, 10, 10, 0) 70%
      ),
      radial-gradient(
        ellipse 70% 50% at 30% 85%,
        rgba(15, 23, 42, 0.55) 0%,
        rgba(15, 23, 42, 0.15) 45%,
        rgba(10, 10, 10, 0) 75%
      ),
      radial-gradient(
        ellipse 60% 40% at 75% 95%,
        rgba(74, 20, 38, 0.35) 0%,
        rgba(74, 20, 38, 0.1) 45%,
        rgba(10, 10, 10, 0) 75%
      ),
      #050505;
    overflow: hidden;
    isolation: isolate;
  }

  /* Canvas scale is set at runtime by the fit() function below via the
     --fit custom property, which is read by the .canvas transform rule. */

  /* Light sweep — a slow diagonal shimmer across the whole canvas. */
  .canvas::before {
    content: "";
    position: absolute;
    inset: -30%;
    background: linear-gradient(
      115deg,
      transparent 40%,
      rgba(243, 217, 138, 0.06) 48%,
      rgba(243, 217, 138, 0.12) 50%,
      rgba(243, 217, 138, 0.06) 52%,
      transparent 60%
    );
    animation: sweep 9s ease-in-out infinite;
    pointer-events: none;
    z-index: 1;
  }

  /* Film grain — subtle, high-frequency noise for premium depth.
     Uses an inline SVG turbulence so there's no image dependency. */
  .canvas::after {
    content: "";
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.92  0 0 0 0 0.86  0 0 0 0 0.55  0 0 0 0.55 0'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.35'/></svg>");
    mix-blend-mode: overlay;
    opacity: 0.12;
    pointer-events: none;
    z-index: 2;
  }

  /* Vignette */
  .vignette {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 3;
    background: radial-gradient(
      ellipse 80% 70% at 50% 50%,
      rgba(0, 0, 0, 0) 55%,
      rgba(0, 0, 0, 0.55) 100%
    );
  }

  /* Gold hairline rule frames the composition — a subtle classical border
     1px in from each edge, like an invitation card. */
  .frame {
    position: absolute;
    inset: 48px;
    border: 1px solid rgba(212, 175, 55, 0.16);
    pointer-events: none;
    z-index: 4;
  }
  .frame::before,
  .frame::after {
    content: "";
    position: absolute;
    width: 22px;
    height: 22px;
    border-color: rgba(243, 217, 138, 0.7);
    border-style: solid;
    border-width: 0;
  }
  /* top-left + top-right tick marks */
  .frame::before {
    top: -1px; left: -1px;
    border-top-width: 1px; border-left-width: 1px;
  }
  .frame::after {
    top: -1px; right: -1px;
    border-top-width: 1px; border-right-width: 1px;
  }
  .frame-b, .frame-b::before, .frame-b::after {}
  .frame-b {
    position: absolute;
    inset: 48px;
    pointer-events: none;
    z-index: 4;
  }
  .frame-b::before,
  .frame-b::after {
    content: "";
    position: absolute;
    width: 22px; height: 22px;
    border-color: rgba(243, 217, 138, 0.7);
    border-style: solid; border-width: 0;
  }
  .frame-b::before {
    bottom: -1px; left: -1px;
    border-bottom-width: 1px; border-left-width: 1px;
  }
  .frame-b::after {
    bottom: -1px; right: -1px;
    border-bottom-width: 1px; border-right-width: 1px;
  }

  /* Content stack */
  .stack {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 180px 90px;
    z-index: 5;
    text-align: center;
  }

  /* Seal — reused from ConsiliumSeal.tsx, scaled up for the end card.
     Gets a soft animated halo so it feels alive without being gimmicky. */
  .seal-wrap {
    position: relative;
    width: 320px;
    height: 320px;
    display: grid;
    place-items: center;
    margin-bottom: 72px;
    opacity: 0;
    transform: scale(0.88);
    animation: seal-in 1.4s cubic-bezier(0.2, 0.7, 0.1, 1) 0.2s forwards;
  }
  .seal-halo {
    position: absolute;
    inset: -40px;
    border-radius: 50%;
    background: radial-gradient(
      circle,
      rgba(212, 175, 55, 0.32) 0%,
      rgba(212, 175, 55, 0.08) 40%,
      rgba(212, 175, 55, 0) 65%
    );
    filter: blur(14px);
    animation: halo-pulse 5s ease-in-out infinite;
  }

  /* Eyebrow */
  .eyebrow {
    font-family: "Inter", sans-serif;
    font-weight: 300;
    font-size: 22px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: rgba(243, 217, 138, 0.78);
    margin-bottom: 36px;
    opacity: 0;
    animation: rise 1.1s cubic-bezier(0.2, 0.7, 0.1, 1) 0.9s forwards;
  }

  .eyebrow::before,
  .eyebrow::after {
    content: "";
    display: inline-block;
    width: 44px;
    height: 1px;
    background: linear-gradient(
      90deg,
      transparent,
      rgba(243, 217, 138, 0.7),
      transparent
    );
    vertical-align: middle;
    margin: 0 22px;
    transform: translateY(-3px);
  }

  /* H1 — gold gradient, serif display */
  .h1 {
    font-family: "Cormorant Garamond", "Didot", "Bodoni MT", serif;
    font-weight: 400;
    font-size: 140px;
    line-height: 1.02;
    letter-spacing: 0.01em;
    text-align: center;
    max-width: 900px;
    background: linear-gradient(
      135deg,
      #f6e1a0 0%,
      #f3d98a 25%,
      #d4af37 55%,
      #a88426 85%,
      #7a5c14 100%
    );
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 2px 1px rgba(0, 0, 0, 0.4))
            drop-shadow(0 0 36px rgba(212, 175, 55, 0.12));
    margin-bottom: 10px;
  }

  .h1 .line {
    display: block;
    opacity: 0;
    transform: translateY(32px);
  }
  .h1 .l-welcome { animation: rise 1.3s cubic-bezier(0.2, 0.7, 0.1, 1) 1.25s forwards; }
  .h1 .l-to       { animation: rise 1.3s cubic-bezier(0.2, 0.7, 0.1, 1) 1.55s forwards; }
  .h1 .l-consilium {
    animation: rise 1.5s cubic-bezier(0.2, 0.7, 0.1, 1) 1.85s forwards;
    font-style: italic;
    font-weight: 500;
    letter-spacing: 0.015em;
  }

  /* Latin whisper */
  .latin {
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-weight: 300;
    font-size: 30px;
    color: rgba(229, 229, 229, 0.58);
    margin-top: 32px;
    opacity: 0;
    animation: rise 1.1s cubic-bezier(0.2, 0.7, 0.1, 1) 2.4s forwards;
  }

  /* Divider + URL block at the bottom-ish of composition */
  .urlblock {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    margin-top: 110px;
    opacity: 0;
    animation: rise 1.1s cubic-bezier(0.2, 0.7, 0.1, 1) 2.7s forwards;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 18px;
    width: 360px;
    justify-content: center;
  }
  .divider .line {
    flex: 1;
    height: 1px;
    background: linear-gradient(
      90deg,
      transparent,
      rgba(243, 217, 138, 0.55),
      transparent
    );
  }
  .divider .diamond {
    width: 9px;
    height: 9px;
    transform: rotate(45deg);
    background: linear-gradient(135deg, #f3d98a, #9c7a1f);
    box-shadow: 0 0 14px rgba(212, 175, 55, 0.55);
  }

  .url {
    font-family: "Inter", sans-serif;
    font-weight: 400;
    font-size: 36px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #f3d98a;
    position: relative;
    padding-bottom: 14px;
  }
  .url .dim { color: rgba(243, 217, 138, 0.55); }
  .url::after {
    content: "";
    position: absolute;
    left: 50%;
    bottom: 0;
    transform: translateX(-50%);
    width: 0;
    height: 1px;
    background: linear-gradient(
      90deg,
      transparent,
      rgba(243, 217, 138, 0.9),
      transparent
    );
    animation: underline 1.2s cubic-bezier(0.2, 0.7, 0.1, 1) 3.1s forwards;
  }

  .sub {
    font-family: "Inter", sans-serif;
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(229, 229, 229, 0.5);
    margin-top: 6px;
  }

  /* Kanika signature mark at the very top — subtle brand anchor */
  .topmark {
    position: absolute;
    top: 92px;
    left: 50%;
    transform: translateX(-50%);
    font-family: "Cormorant Garamond", serif;
    font-weight: 300;
    font-style: italic;
    font-size: 26px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(229, 229, 229, 0.38);
    z-index: 6;
    opacity: 0;
    animation: rise 1s cubic-bezier(0.2, 0.7, 0.1, 1) 0.4s forwards;
  }

  /* Keyframes */
  @keyframes rise {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes seal-in {
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes halo-pulse {
    0%, 100% { opacity: 0.9; transform: scale(1); }
    50%      { opacity: 1;   transform: scale(1.06); }
  }
  @keyframes sweep {
    0%   { transform: translateX(-30%) translateY(-10%); }
    50%  { transform: translateX(30%) translateY(10%); }
    100% { transform: translateX(-30%) translateY(-10%); }
  }
  @keyframes underline {
    0%   { width: 0; }
    100% { width: 440px; }
  }

  /* Slow rotating cardinal rays behind the seal — adds ceremony */
  .rays {
    position: absolute;
    inset: -120px;
    z-index: -1;
    animation: spin 42s linear infinite;
    opacity: 0.5;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Record control — floating UI over the stage. Hidden during capture so
     the button itself doesn't appear in the recorded video. */
  .recorder {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 10px;
    font-family: "Inter", sans-serif;
  }
  .rec-btn {
    background: linear-gradient(135deg, #f3d98a, #d4af37 60%, #9c7a1f);
    color: #0a0a0a;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 12px 22px;
    border: none;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 8px 28px -8px rgba(212, 175, 55, 0.6);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .rec-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 12px 32px -8px rgba(212, 175, 55, 0.75);
  }
  .rec-btn:disabled { opacity: 0.5; cursor: wait; }
  .rec-hint {
    background: rgba(10, 10, 10, 0.85);
    color: #e5e5e5;
    font-size: 12px;
    padding: 8px 14px;
    border-radius: 8px;
    max-width: 260px;
    line-height: 1.45;
    border: 1px solid rgba(212, 175, 55, 0.2);
  }
  .rec-status {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(178, 34, 34, 0.9);
    color: white;
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .rec-dot {
    width: 10px;
    height: 10px;
    background: white;
    border-radius: 50%;
    animation: blink 1s ease-in-out infinite;
  }
  @keyframes blink { 50% { opacity: 0.25; } }
  .recorder.hidden { display: none !important; }
</style>
</head>
<body>
  <div class="recorder" id="recorder">
    <button class="rec-btn" id="recBtn" type="button">Record &amp; Download</button>
    <div class="rec-hint">
      Click, then choose <b>“This Tab”</b> in the popup. Recording auto-starts, captures ~7&nbsp;seconds, and downloads a .webm file.
    </div>
  </div>

  <div class="stage">
    <div class="canvas" role="img" aria-label="Welcome to The Consilium — kanikarose.com/consilium">
      <div class="vignette"></div>
      <div class="frame"></div>
      <div class="frame-b"></div>

      <div class="topmark">Kanika Batra</div>

      <div class="stack">
        <!-- Seal with halo -->
        <div class="seal-wrap">
          <div class="seal-halo"></div>

          <!-- Faint rotating rays behind the seal -->
          <svg class="rays" viewBox="0 0 400 400" aria-hidden="true">
            <defs>
              <radialGradient id="ray-fade" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="rgba(243,217,138,0)"/>
                <stop offset="55%" stop-color="rgba(243,217,138,0.25)"/>
                <stop offset="100%" stop-color="rgba(243,217,138,0)"/>
              </radialGradient>
            </defs>
            <g stroke="url(#ray-fade)" stroke-width="0.6" fill="none">
              <!-- 24 radial hairlines -->
              <g transform="translate(200 200)">
                <!-- Generated: every 15deg -->
                <line x1="0" y1="-190" x2="0" y2="-140"/>
                <line transform="rotate(15)"  x1="0" y1="-190" x2="0" y2="-140"/>
                <line transform="rotate(30)"  x1="0" y1="-190" x2="0" y2="-140"/>
                <line transform="rotate(45)"  x1="0" y1="-190" x2="0" y2="-140"/>
                <line transform="rotate(60)"  x1="0" y1="-190" x2="0" y2="-140"/>
                <line transform="rotate(75)"  x1="0" y1="-190" x2="0" y2="-140"/>
                <line transform="rotate(90)"  x1="0" y1="-190" x2="0" y2="-140"/>
                <line transform="rotate(105)" x1="0" y1="-190" x2="0" y2="-140"/>
                <line transform="rotate(120)" x1="0" y1="-190" x2="0" y2="-140"/>
                <line transform="rotate(135)" x1="0" y1="-190" x2="0" y2="-140"/>
                <line transform="rotate(150)" x1="0" y1="-190" x2="0" y2="-140"/>
                <line transform="rotate(165)" x1="0" y1="-190" x2="0" y2="-140"/>
                <line transform="rotate(180)" x1="0" y1="-190" x2="0" y2="-140"/>
                <line transform="rotate(195)" x1="0" y1="-190" x2="0" y2="-140"/>
                <line transform="rotate(210)" x1="0" y1="-190" x2="0" y2="-140"/>
                <line transform="rotate(225)" x1="0" y1="-190" x2="0" y2="-140"/>
                <line transform="rotate(240)" x1="0" y1="-190" x2="0" y2="-140"/>
                <line transform="rotate(255)" x1="0" y1="-190" x2="0" y2="-140"/>
                <line transform="rotate(270)" x1="0" y1="-190" x2="0" y2="-140"/>
                <line transform="rotate(285)" x1="0" y1="-190" x2="0" y2="-140"/>
                <line transform="rotate(300)" x1="0" y1="-190" x2="0" y2="-140"/>
                <line transform="rotate(315)" x1="0" y1="-190" x2="0" y2="-140"/>
                <line transform="rotate(330)" x1="0" y1="-190" x2="0" y2="-140"/>
                <line transform="rotate(345)" x1="0" y1="-190" x2="0" y2="-140"/>
              </g>
            </g>
          </svg>

          <!-- The Seal itself — scaled up, identical to ConsiliumSeal.tsx -->
          <svg width="260" height="260" viewBox="0 0 100 100" aria-hidden="true">
            <defs>
              <linearGradient id="cs-gold" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%"  stop-color="#f3d98a"/>
                <stop offset="50%" stop-color="#d4af37"/>
                <stop offset="100%" stop-color="#9c7a1f"/>
              </linearGradient>
            </defs>

            <!-- Outer hairline ring -->
            <circle cx="50" cy="50" r="48" fill="none" stroke="url(#cs-gold)" stroke-width="0.6" opacity="0.55"/>
            <!-- Primary ring -->
            <circle cx="50" cy="50" r="44" fill="none" stroke="url(#cs-gold)" stroke-width="1.6"/>
            <!-- Inner ring -->
            <circle cx="50" cy="50" r="39" fill="none" stroke="url(#cs-gold)" stroke-width="0.4" opacity="0.35"/>

            <!-- Cardinal points -->
            <circle cx="50" cy="3.5" r="1.4" fill="url(#cs-gold)"/>
            <circle cx="96.5" cy="50" r="1.4" fill="url(#cs-gold)"/>
            <circle cx="50" cy="96.5" r="1.4" fill="url(#cs-gold)"/>
            <circle cx="3.5" cy="50" r="1.4" fill="url(#cs-gold)"/>

            <!-- Roman inscription markers flanking the C -->
            <line x1="15" y1="50" x2="20" y2="50" stroke="url(#cs-gold)" stroke-width="0.9" opacity="0.7"/>
            <line x1="80" y1="50" x2="85" y2="50" stroke="url(#cs-gold)" stroke-width="0.9" opacity="0.7"/>

            <!-- Serif C -->
            <text x="50" y="50"
                  text-anchor="middle"
                  dominant-baseline="central"
                  fill="url(#cs-gold)"
                  font-family="Didot, 'Bodoni MT', 'Cormorant Garamond', Georgia, 'Times New Roman', serif"
                  font-weight="500"
                  font-size="56">C</text>
          </svg>
        </div>

        <!-- Eyebrow -->
        <div class="eyebrow">A Private Council</div>

        <!-- H1 -->
        <h1 class="h1">
          <span class="line l-welcome">Welcome to</span>
          <span class="line l-to"></span>
          <span class="line l-consilium">The Consilium</span>
        </h1>

        <!-- Latin whisper -->
        <p class="latin">kon&middot;sil&middot;i&middot;um &nbsp;&middot;&nbsp; council, strategy, deliberation</p>

        <!-- URL block -->
        <div class="urlblock">
          <div class="divider">
            <span class="line"></span>
            <span class="diamond"></span>
            <span class="line"></span>
          </div>
          <div class="url"><span class="dim">kanikarose.com</span>/consilium</div>
          <div class="sub">Step Inside</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Remove the blank middle line — it was a spacer for a three-line H1
    // layout but we ended up only using two lines; remove it so the italic
    // "The Consilium" sits immediately under "Welcome to" with correct
    // vertical rhythm.
    document.querySelector(".h1 .l-to").remove();

    // Fit the 1080x1920 canvas inside whatever viewport we're in, keeping
    // the 9:16 ratio. CSS media-query scaling didn't work because scale()
    // requires a unitless number; computing it here guarantees the right
    // value regardless of window size.
    const canvas = document.querySelector(".canvas");
    function fit() {
      const pad = 24; // breathing room
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const aw = vw - pad * 2;
      const ah = vh - pad * 2;
      const scale = Math.min(aw / 1080, ah / 1920);
      canvas.style.setProperty("--fit", scale);
      // Center the scaled canvas in the viewport. Because transform-origin
      // is top-left, the scaled footprint starts at (left, top) and is
      // scaled*1080 wide by scaled*1920 tall.
      const sw = 1080 * scale;
      const sh = 1920 * scale;
      canvas.style.left = Math.round((vw - sw) / 2) + "px";
      canvas.style.top  = Math.round((vh - sh) / 2) + "px";
    }
    fit();
    window.addEventListener("resize", fit);

    // =========================================================
    //  One-click recorder
    // =========================================================
    //  Uses getDisplayMedia to capture the current browser tab,
    //  restarts the canvas animations from t=0, and runs MediaRecorder
    //  for ~7.5s — long enough to cover the full reveal plus a held
    //  beat at the end. Hides its own UI during recording so the button
    //  doesn't appear in the output video.
    const recorderUI = document.getElementById("recorder");
    const recBtn = document.getElementById("recBtn");
    const RECORD_MS = 7500;

    recBtn.addEventListener("click", async () => {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
        alert("Your browser doesn't support tab recording. Use Chrome or Edge.");
        return;
      }

      let stream;
      try {
        // preferCurrentTab narrows the picker to just this tab on
        // Chromium. Even without it, the user can still choose the tab.
        stream = await navigator.mediaDevices.getDisplayMedia({
          video: {
            frameRate: 60,
            width: { ideal: 1080 },
            height: { ideal: 1920 },
          },
          audio: false,
          preferCurrentTab: true,
          selfBrowserSurface: "include",
        });
      } catch (err) {
        if (err && err.name === "NotAllowedError") return;
        console.error(err);
        alert("Couldn't start recording: " + err.message);
        return;
      }

      // Try MP4/H.264 first (Chrome 126+), fall back to WebM if the
      // browser can't record MP4 directly. File extension follows the
      // actual codec so the user's video editor recognises it correctly.
      const candidates = [
        { mime: "video/mp4;codecs=avc1.42E01E",   ext: "mp4"  },
        { mime: "video/mp4;codecs=h264",          ext: "mp4"  },
        { mime: "video/mp4",                      ext: "mp4"  },
        { mime: "video/webm;codecs=vp9",          ext: "webm" },
        { mime: "video/webm;codecs=vp8",          ext: "webm" },
        { mime: "video/webm",                     ext: "webm" },
      ];
      const chosen = candidates.find((c) => MediaRecorder.isTypeSupported(c.mime))
        || { mime: "video/webm", ext: "webm" };

      const recorder = new MediaRecorder(stream, {
        mimeType: chosen.mime,
        videoBitsPerSecond: 12_000_000,
      });

      const chunks = [];
      recorder.ondataavailable = (e) => {
        if (e.data && e.data.size > 0) chunks.push(e.data);
      };
      recorder.onstop = () => {
        stream.getTracks().forEach((t) => t.stop());
        const blob = new Blob(chunks, { type: chosen.mime.split(";")[0] });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "consilium-end-card." + chosen.ext;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 5000);
        // Restore UI for a possible second take, show which format we got.
        recorderUI.classList.remove("hidden");
        showStatus(false);
        recBtn.disabled = false;
        recBtn.textContent = "Record & Download";
        const hint = document.querySelector(".rec-hint");
        if (hint) hint.innerHTML = "Saved as <b>consilium-end-card." + chosen.ext + "</b>. Click again to re-record.";
      };

      // Hide the button so it doesn't land in the video, show a
      // recording indicator briefly, then restart animations.
      recorderUI.classList.add("hidden");
      showStatus(true);
      restartAnimations();
      recorder.start();

      setTimeout(() => {
        if (recorder.state !== "inactive") recorder.stop();
      }, RECORD_MS);
    });

    function showStatus(on) {
      let el = document.getElementById("recStatus");
      if (on) {
        if (!el) {
          el = document.createElement("div");
          el.id = "recStatus";
          el.className = "recorder";
          el.innerHTML = '<div class="rec-status"><span class="rec-dot"></span>Recording</div>';
          document.body.appendChild(el);
        }
      } else if (el) {
        el.remove();
      }
    }

    // Clone the canvas in place to force all CSS animations to re-run
    // from t=0 — simplest reliable way to "replay" the whole reveal.
    function restartAnimations() {
      const old = document.querySelector(".canvas");
      const clone = old.cloneNode(true);
      old.replaceWith(clone);
      fit();
    }
  </script>
</body>
</html>
