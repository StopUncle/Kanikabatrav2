name: CI

# Runs on every push and PR. Mirrors what Railway does at deploy time so
# regressions get caught before merge instead of after.
#
# This workflow would have caught:
#   - the admin migration leaving unused `request` parameters that tripped
#     ESLint (local tsc --noEmit doesn't run ESLint)
#   - any TypeScript regression from dependency updates
#   - the Stripe webhook idempotency bug if there were a test for it

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        # Next.js + tsc both need the generated client to resolve @prisma/client
        # exports. prisma generate also validates the schema.
        run: npx prisma generate

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx next lint

  build:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Next.js build
        # We skip the `prisma db push` that nixpacks.toml runs — this job has
        # no database. If the build fails because of a schema reference to a
        # column that doesn't exist in the generated client, that's a real
        # bug we want to catch before deploy.
        env:
          # Stub env vars that would otherwise make the build bail at module
          # load time. Real values live on Railway; these are just enough to
          # let the build graph resolve.
          NODE_ENV: production
          DATABASE_URL: postgresql://stub:stub@localhost:5432/stub
          JWT_SECRET: ci-stub-jwt-secret-at-least-32-characters-long
          STRIPE_SECRET_KEY: sk_test_stub
          STRIPE_WEBHOOK_SECRET: whsec_stub
          NEXT_PUBLIC_BASE_URL: https://kanikarose.com
        run: npm run build

  tests:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Jest tests
        # Currently only covers auth. Still worth running because it would
        # catch breakage in the JWT / password / Prisma user paths.
        run: npm test -- --passWithNoTests
