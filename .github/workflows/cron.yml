name: Scheduled crons

# Hits the cron endpoints on a schedule. Without this workflow the
# /api/cron/* endpoints in the app exist but nothing calls them, so
# daily content, retry emails, and queued email sequences all sit dead.
#
# Secrets required in the GitHub repo settings:
#   CRON_SECRET           — must match process.env.CRON_SECRET on Railway
#   ADMIN_SECRET          — only used as a fallback bearer for retry-emails
#                           and email-queue/process, which currently fall
#                           back to ADMIN_SECRET if CRON_SECRET is unset
#
# GitHub Actions cron note: scheduled workflows can be delayed up to ~15
# minutes during high-load periods on the shared runner pool. That's fine
# for daily content, retry queues, and email processing — it's NOT fine
# for anything latency-sensitive. If you need precise timing, move that
# particular endpoint off GitHub Actions and onto a Railway cron service.

on:
  schedule:
    # Daily insight — 09:00 UTC (adjust to match your audience's morning)
    - cron: '0 9 * * *'
    # Discussion prompt — 10:00 UTC (one hour after insight so they don't collide)
    - cron: '0 10 * * *'
    # Retry failed book-delivery emails — every 30 minutes
    - cron: '*/30 * * * *'
    # Process the email queue — every 15 minutes
    - cron: '*/15 * * * *'
    # Weekly member digest — Sunday 08:00 UTC (one hour before daily-insight
    # so the two jobs don't collide on Sundays)
    - cron: '0 8 * * 0'
    # Trial expiry nudge — daily at 09:30 UTC (right after daily-insight)
    - cron: '30 9 * * *'
    # Background queue worker — every 5 min
    - cron: '*/5 * * * *'
    # Daily Tell push — every hour at :03 (every user has their own preferred
    # local hour; the cron compares the hour-in-tz against their preference,
    # so we run hourly and pick up everyone whose hour matches right now).
    # Offset to :03 so it does not collide with the on-the-hour insight crons.
    - cron: '3 * * * *'
    # Auto-publish SCHEDULED Tells — daily at 00:05 UTC, just after the day rolls.
    - cron: '5 0 * * *'
    # Training bots tick — daily at 00:15 UTC, ten minutes after the new
    # Tell auto-publishes. Each training bot rolls against its archetype's
    # activity probability and writes a TellResponse if it "shows up."
    - cron: '15 0 * * *'
    # Resolve leagues — Sunday 23:59 UTC. Stamps finalRank + outcome on
    # every membership, sets league.resolvedAt. ISO week boundary is
    # Monday 00:00 UTC, so this catches the just-ending week before the
    # new week's first answers create new memberships.
    - cron: '59 23 * * 0'
  workflow_dispatch:
    # Allow manual triggering from the GitHub Actions UI. Useful for
    # testing or firing a cron out-of-band without waiting for the next
    # scheduled run.
    inputs:
      target:
        description: 'Which cron to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - daily-insight
          - discussion-prompt
          - retry-emails
          - email-queue
          - weekly-digest
          - trial-expiry
          - bot-actions
          - daily-tell-push
          - publish-tells
          - training-bots-tick
          - resolve-leagues

env:
  BASE_URL: https://kanikarose.com

jobs:
  daily-insight:
    # Run on the 09:00 schedule OR when manually dispatched with the right target
    if: >-
      github.event.schedule == '0 9 * * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.target == 'all' || github.event.inputs.target == 'daily-insight'))
    runs-on: ubuntu-latest
    steps:
      - name: Hit /api/cron/daily-insight
        run: |
          curl -fsS -X POST "$BASE_URL/api/cron/daily-insight" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 60

  discussion-prompt:
    if: >-
      github.event.schedule == '0 10 * * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.target == 'all' || github.event.inputs.target == 'discussion-prompt'))
    runs-on: ubuntu-latest
    steps:
      - name: Hit /api/cron/discussion-prompt
        run: |
          curl -fsS -X POST "$BASE_URL/api/cron/discussion-prompt" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 60

  retry-emails:
    if: >-
      github.event.schedule == '*/30 * * * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.target == 'all' || github.event.inputs.target == 'retry-emails'))
    runs-on: ubuntu-latest
    steps:
      - name: Hit /api/cron/retry-emails
        # retry-emails uses Authorization: Bearer <secret>. Its server-side
        # code accepts CRON_SECRET or ADMIN_SECRET as a fallback.
        run: |
          curl -fsS -X POST "$BASE_URL/api/cron/retry-emails" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 120

  email-queue:
    if: >-
      github.event.schedule == '*/15 * * * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.target == 'all' || github.event.inputs.target == 'email-queue'))
    runs-on: ubuntu-latest
    steps:
      - name: Hit /api/admin/email-queue/process
        # Endpoint accepts either the admin_session cookie (for manual
        # admin-panel triggering) or x-cron-secret (for scheduled callers
        # like this one). See app/api/admin/email-queue/process/route.ts
        # `authorize()` for the dual-auth logic.
        run: |
          curl -fsS -X POST "$BASE_URL/api/admin/email-queue/process" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"dryRun":false}' \
            --max-time 120

  weekly-digest:
    if: >-
      github.event.schedule == '0 8 * * 0' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.target == 'all' || github.event.inputs.target == 'weekly-digest'))
    runs-on: ubuntu-latest
    steps:
      - name: Hit /api/cron/weekly-digest
        # Sends a weekly summary email to every ACTIVE Inner Circle member.
        # Long timeout because it loops through all active members serially.
        run: |
          curl -fsS -X POST "$BASE_URL/api/cron/weekly-digest" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 300

  trial-expiry:
    if: >-
      github.event.schedule == '30 9 * * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.target == 'all' || github.event.inputs.target == 'trial-expiry'))
    runs-on: ubuntu-latest
    steps:
      - name: Hit /api/cron/trial-expiry
        run: |
          curl -fsS -X POST "$BASE_URL/api/cron/trial-expiry" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 60

  bot-actions:
    # Background queue worker. Settings-gated; no-ops by default.
    if: >-
      github.event.schedule == '*/5 * * * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.target == 'all' || github.event.inputs.target == 'bot-actions'))
    runs-on: ubuntu-latest
    steps:
      - name: Hit endpoint
        run: |
          curl -fsS -X POST "$BASE_URL/api/cron/bot-actions" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 120

  daily-tell-push:
    # Hourly. Each user has a preferred local hour stored on their
    # pushPreferences; the route checks "is now their hour in their
    # timezone, and have we not yet sent today" and only sends to those
    # who match. Safe to over-run — idempotent by lastSent date.
    if: >-
      github.event.schedule == '3 * * * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.target == 'all' || github.event.inputs.target == 'daily-tell-push'))
    runs-on: ubuntu-latest
    steps:
      - name: Hit /api/cron/daily-tell-push
        run: |
          curl -fsS -X POST "$BASE_URL/api/cron/daily-tell-push" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 120

  publish-tells:
    # Daily, just after midnight UTC. Promotes SCHEDULED Tells whose
    # scheduleDate has arrived to PUBLISHED so Kanika can queue weeks
    # ahead in /admin/tells without manually flipping each one live.
    if: >-
      github.event.schedule == '5 0 * * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.target == 'all' || github.event.inputs.target == 'publish-tells'))
    runs-on: ubuntu-latest
    steps:
      - name: Hit /api/cron/publish-tells
        run: |
          curl -fsS -X POST "$BASE_URL/api/cron/publish-tells" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 60

  training-bots-tick:
    # Daily, 00:15 UTC. Each training bot rolls against its archetype's
    # activity probability and writes a TellResponse if it shows up.
    # Idempotent — safe to manually re-fire after a failure.
    if: >-
      github.event.schedule == '15 0 * * *' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.target == 'all' || github.event.inputs.target == 'training-bots-tick'))
    runs-on: ubuntu-latest
    steps:
      - name: Hit /api/cron/training-bots-tick
        run: |
          curl -fsS -X POST "$BASE_URL/api/cron/training-bots-tick" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 300

  resolve-leagues:
    # Sunday 23:59 UTC. Stamps finalRank + outcome on every membership
    # and sets league.resolvedAt. ISO week boundary is Monday 00:00 UTC,
    # so this lands in the last minute of the just-ending week.
    if: >-
      github.event.schedule == '59 23 * * 0' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.target == 'all' || github.event.inputs.target == 'resolve-leagues'))
    runs-on: ubuntu-latest
    steps:
      - name: Hit /api/cron/resolve-leagues
        run: |
          curl -fsS -X POST "$BASE_URL/api/cron/resolve-leagues" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 120
