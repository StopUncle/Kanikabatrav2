[phases.setup]
nixPkgs = ["nodejs_20", "openssl"]

[phases.install]
# `--include=dev` overrides the NODE_ENV=production variable set below,
# which would otherwise make npm ci skip devDependencies. We need the
# build-time dev deps (tailwindcss, postcss, autoprefixer, typescript,
# etc.) installed for `next build` to resolve its PostCSS plugins.
cmds = ["npm ci --include=dev"]

[phases.build]
cmds = [
  "npx prisma generate",
  # Sync schema additions to the live DB before the new code that uses them
  # boots. The repo has historically been managed via `db push` (the
  # migrations folder is incomplete relative to schema.prisma), so this is
  # the consistent path. Additive changes only — never run with
  # --accept-data-loss without explicit user approval.
  "npx prisma db push --skip-generate",
  "npm run build",
]

[start]
cmd = "NODE_OPTIONS='--max-old-space-size=512' next start -p ${PORT:-3000}"

[variables]
NODE_ENV = "production"

# Disable cache mounts to prevent stale chunks
[build]
cacheDirectories = []